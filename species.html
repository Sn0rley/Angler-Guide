<section id="species" class="section-block" aria-label="Species">
  <h2>Species Overview</h2>
  <p>Common species in many freshwater systems and quick notes on where to find them.</p>

  <figure style="margin:12px 0;padding:12px;background:#fff;border-radius:8px;border:1px solid rgba(101,155,128,0.08)">
    <img src="https://bassforecast-website.s3.amazonaws.com/production/public/assets/blog/bassforecast-shutterstock_1124052620.jpeg"
         alt="Largemouth bass near vegetation"
         style="width:100%;height:auto;border-radius:6px;display:block">
    <figcaption style="margin-top:8px;color:#21332A;font-size:14px">
      <strong>Largemouth Bass</strong> — Preferred habitats: weedy shorelines, submerged structure, and docks. Try topwater lures early morning.
    </figcaption>
  </figure>

  <figure style="margin:12px 0;padding:12px;background:#fff;border-radius:8px;border:1px solid rgba(101,155,128,0.08)">
    <img src="https://content.osgnetworks.tv/photopacks/how-to-target-channel-catfish-during-spring-run-off_526050/526054_gaf-lead-channel-cat_hero_1200x800.jpg"
         alt="Channel catfish on a river bottom"
         style="width:100%;height:auto;border-radius:6px;display:block">
    <figcaption style="margin-top:8px;color:#21332A;font-size:14px">
      <strong>Channel Catfish</strong> — Active at dusk and night; bait anglers often succeed with cut bait or stink baits near deeper holes.
    </figcaption>
  </figure>

  <figure style="margin:12px 0;padding:12px;background:#fff;border-radius:8px;border:1px solid rgba(101,155,128,0.08)">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS0QSVmMZlmK1Sg-L_pIyfne-UlYILFpS2WKQ&s"
         alt="Rainbow trout in a clear stream"
         style="width:100%;height:auto;border-radius:6px;display:block">
    <figcaption style="margin-top:8px;color:#21332A;font-size:14px">
      <strong>Rainbow Trout</strong> — Cold-water streams and stocked lakes; use light tackle, small spinners, and natural baits.
    </figcaption>
  </figure>

  <figure style="margin:12px 0;padding:12px;background:#fff;border-radius:8px;border:1px solid rgba(101,155,128,0.08)">
    <img src="https://personalhandcrafteddisplays.com/cdn/shop/articles/b00c38507ee68d4586c3ce787d44215c_1200x1200.jpg?v=1617893303"
         alt="Bluegill near shallow weeds"
         style="width:100%;height:auto;border-radius:6px;display:block">
    <figcaption style="margin-top:8px;color:#21332A;font-size:14px">
      <strong>Bluegill</strong> — Shallow weedy bays; great for beginners and kids using small hooks and live bait.
    </figcaption>
  </figure>
</section>
